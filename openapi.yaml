  # Trade Endpoints
  /trades:
    get:
      tags:
        - Trades
      summary: Get user's trades
      description: Get all trades where user is proposer or receiver
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [proposed, accepted, declined, completed]
          description: Filter by trade status
      responses:
        '200':
          description: Trades retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Trade'
                  count:
                    type: integer

    post:
      tags:
        - Trades
      summary: Propose a trade
      description: Create a new trade proposal
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - requestedBook
                - offeredBook
              properties:
                requestedBook:
                  type: string
                  description: ID of the book you want
                  example: "507f1f77bcf86cd799439011"
                offeredBook:
                  type: string
                  description: ID of the book you're offering
                  example: "507f1f77bcf86cd799439012"
      responses:
        '201':
          description: Trade proposal created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Trade'
        '400':
          description: Validation error or books unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not authorized (not book owner)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

